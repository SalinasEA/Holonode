spring.datasource.url=jdbc:sqlite:holonode-test.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=create-drop

# JWT and Origins configuration. Must be set in environment variables
jwt.secret=this-is-a-test-secret-needed-to-pass-tests-make-sure-to-set-configuration-via-readme
jwt.expiration=8140000
allowed.origins=http://localhost:5173